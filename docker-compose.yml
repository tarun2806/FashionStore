
services:
  mysql:
    image: mysql:8.0
    container_name: fashionstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fashionstore}
      MYSQL_USER: ${MYSQL_USER:-fashionstore}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fashionstorepass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - fashionstore-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fashionstore-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - fashionstore-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashionstore-backend
    restart: unless-stopped
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: fashionstore
      DB_USER: root
      DB_PASSWORD: Tarun@1605
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      CSRF_ENABLED: ${CSRF_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      ENV: production
    ports:
      - "8080:8080"
    networks:
      - fashionstore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/home"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-frontend:
    build:
      context: ./fashionstore-admin
      dockerfile: Dockerfile
    container_name: fashionstore-admin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - fashionstore-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: fashionstore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - admin-frontend
    networks:
      - fashionstore-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  fashionstore-network:
    driver: bridge
