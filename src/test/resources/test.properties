# Test Configuration for FashionStore
# This file is used for integration tests with Testcontainers

# Database Configuration (will be overridden by Testcontainers)
db.url=jdbc:mysql://localhost:3306/fashionstore_test
db.user=root
db.password=test
db.driver=com.mysql.cj.jdbc.Driver

# Redis Configuration (disabled for tests)
redis.enabled=false
redis.host=localhost
redis.port=6379
redis.password=

# Test Environment
test.environment=test
test.timeout=30000

# CSRF Configuration (disabled for tests)
csrf.enabled=false

# Rate Limiting (disabled for tests)
rate.limit.enabled=false

# Email Service (disabled for tests)
email.enabled=false

# Session Configuration for tests
session.timeout=3600
